services:
  ps5rmtctl:
    build: .
    image: ps5rmtctl:latest
    container_name: ps5rmtctl
    restart: unless-stopped
    # Your console IP, PSN user, and API token live in .env (gitignored).
    # Copy .env.example -> .env and fill it in.
    env_file:
      - .env
    # Persist registration keys + config. Seed it by copying the profile you
    # already made:  ./data/.pyremoteplay/.profile.json
    volumes:
      - ./data:/data
    ports:
      # host:container — reachable from the host (and its Tailscale IP).
      - "8645:8645"
    # Auto-release the session after N seconds idle (override via .env).
    command: ["serve", "--bind", "0.0.0.0", "--port", "8645", "--idle-timeout", "${PS5RMTCTL_IDLE_TIMEOUT:-120}"]

    # ---------------------------------------------------------------------
    # NETWORKING — the important bit for Remote Play (UDP to the PS5):
    #
    # On a LINUX Docker host, prefer host networking so the container sits
    # directly on the LAN (most reliable for the UDP session). Then REMOVE the
    # `ports:` block above (host mode ignores it) and uncomment:
    #
    #   network_mode: host
    #
    # On Docker Desktop for WINDOWS/macOS, `network_mode: host` does NOT expose
    # the LAN — keep the bridge + `ports:` mapping above. Outbound *unicast* UDP
    # to the PS5 traverses Docker's NAT fine (verified: a full Remote Play
    # session + button input works from inside a bridge-NAT'd container, because
    # we never broadcast). If it ever misbehaves, see the README WSL2
    # "mirrored networking" fallback.
    # ---------------------------------------------------------------------
